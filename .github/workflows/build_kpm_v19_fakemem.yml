name: Build sgame-fakemem v19 KPM

on:
  workflow_dispatch:
  push:
    paths:
      - 'kpms/sgame-fakemem-v19/**'
      - '.github/workflows/build_kpm_v19_fakemem.yml'

jobs:
  Build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Install aarch64 toolchain
        run: |
          curl -L -o tc.tar.xz \
            "https://armkeil.blob.core.windows.net/developer/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf.tar.xz"
          tar -Jxf tc.tar.xz

      - name: Build kernel headers (make hdr)
        run: |
          export TARGET_COMPILE="$(pwd)/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf/bin/aarch64-none-elf-"
          cd kernel
          make hdr

      - name: Build v19 KPM
        run: |
          export TARGET_COMPILE="$(pwd)/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf/bin/aarch64-none-elf-"
          cd kpms/sgame-fakemem-v19
          make
          ls -la *.kpm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sgame-fakemem-v19
          path: kpms/sgame-fakemem-v19/sgame-fakemem-v19.kpm
          if-no-files-found: error
